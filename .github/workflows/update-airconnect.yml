name: Update AirConnect Version

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
  push:
    branches: [ main ]
    paths: [ '.github/workflows/update-airconnect.yml', 'scripts/update-airconnect-release.rb' ]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-airconnect
  cancel-in-progress: false

env:
  UPSTREAM_REPO: philippe44/AirConnect
  FORMULA_FILE: Formula/airconnect.rb

jobs:
  check-and-update:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0

    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.2'

    - name: Update AirConnect release files
      id: update
      run: ruby scripts/update-airconnect-release.rb
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Package AirConnect support resource
      if: steps.update.outputs.update_needed == 'true'
      run: |
        VERSION="${{ steps.update.outputs.new_version }}"
        TAG="airconnect-support-${VERSION}"
        ARCHIVE="homebrew-airconnect-support-${VERSION}.tar.gz"
        ARCHIVE_PATH="${RUNNER_TEMP}/${ARCHIVE}"

        tar -czf "${ARCHIVE_PATH}" \
          scripts/airconnect-service.sh \
          scripts/airconnect-manager.sh \
          configs/airconnect.conf

        export SUPPORT_SHA256
        SUPPORT_SHA256="$(sha256sum "${ARCHIVE_PATH}" | awk '{print $1}')"

        gh release view "${TAG}" >/dev/null 2>&1 || \
          gh release create "${TAG}" --title "AirConnect support files ${VERSION}" --notes "Versioned support files for the Homebrew AirConnect formula."
        gh release upload "${TAG}" "${ARCHIVE_PATH}" --clobber

        ruby -e '
          version = ENV.fetch("VERSION")
          sha = ENV.fetch("SUPPORT_SHA256")
          archive = "homebrew-airconnect-support-#{version}.tar.gz"
          url = "https://github.com/dmego/homebrew-airconnect/releases/download/airconnect-support-#{version}/#{archive}"
          formula = File.read("Formula/airconnect.rb")
          replacement = %(resource "airconnect-support" do\n    url "#{url}"\n    sha256 "#{sha}"\n  end)
          updated = formula.sub(/resource "airconnect-support" do\n    url "[^"]+"\n    sha256 "[^"]+"\n  end/m, replacement)
          abort("airconnect-support resource block was not updated") if updated == formula
          File.write("Formula/airconnect.rb", updated)
        '
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        VERSION: ${{ steps.update.outputs.new_version }}

    - name: Run regression checks
      run: bash tests/airconnect_regression_test.sh

    - name: Verify update diff
      if: steps.update.outputs.update_needed == 'true'
      run: |
        ruby -e '
          expected = %w[
            Formula/airconnect.rb
            scripts/airconnect-manager.sh
            CHANGELOG.md
          ]
          changed = `git diff --name-only`.lines.map(&:strip).reject(&:empty?)
          missing = ["Formula/airconnect.rb"] - changed
          unexpected = changed - expected
          abort("Formula/airconnect.rb was not changed") unless missing.empty?
          abort("Unexpected files changed: #{unexpected.join(", ")}") unless unexpected.empty?
        '

    - name: Create Pull Request
      if: steps.update.outputs.update_needed == 'true'
      uses: peter-evans/create-pull-request@v5
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: "chore: update AirConnect to ${{ steps.update.outputs.new_version }}"
        title: "Update AirConnect to ${{ steps.update.outputs.new_version }}"
        body: |
          ## AirConnect Version Update

          This PR updates AirConnect to the latest upstream release.

          | Field | Previous | New |
          |-------|----------|-----|
          | Version | `${{ steps.update.outputs.current_version }}` | `${{ steps.update.outputs.new_version }}` |
          | SHA256 | `(updated)` | `${{ steps.update.outputs.new_sha256 }}` |
          | Release Date | - | `${{ steps.update.outputs.release_date }}` |
          | File Size | - | `${{ steps.update.outputs.file_size }} MB` |
          | Download URL | - | ${{ steps.update.outputs.download_url }} |

          ### Upstream Release Notes

          ${{ steps.update.outputs.release_notes_block }}

          ### Verification

          - Downloaded upstream release asset and calculated SHA256.
          - Updated Formula URL and SHA256.
          - Updated manager version metadata.
          - Published versioned support resource archive.
          - Updated CHANGELOG without duplicate entries.
          - Ran repository regression checks.
        branch: update-airconnect-${{ steps.update.outputs.new_version }}
        add-paths: |
          Formula/airconnect.rb
          scripts/airconnect-manager.sh
          CHANGELOG.md
        delete-branch: true
        draft: false
